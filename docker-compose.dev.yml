services:
  postgres:
    image: postgres:16-alpine
    container_name: flowai-postgres
    environment:
      POSTGRES_USER: flowai
      POSTGRES_PASSWORD: flowai
      POSTGRES_DB: flowai
    ports:
      - "5432:5432"
    volumes:
      - flowai-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowai -d flowai"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: flowai-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - flowai-qdrant-data:/qdrant/storage

volumes:
  flowai-postgres-data:
  flowai-qdrant-data:

